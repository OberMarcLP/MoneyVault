services:
  test-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=moneyvault_test
      - POSTGRES_USER=moneyvault_test
      - POSTGRES_PASSWORD=moneyvault_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyvault_test"]
      interval: 2s
      timeout: 3s
      retries: 10
