services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - caddy_data_dev:/data
      - caddy_config_dev:/config
    environment:
      - BACKEND_URL=backend:8080
      - SITE_ADDRESS=:80
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://moneyvault:moneyvault@db:5432/moneyvault?sslmode=disable
      - JWT_SECRET=dev-secret-change-in-production
      - MIGRATIONS_PATH=file://migrations
      - ENVIRONMENT=development
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost
      - RATE_LIMIT_PER_MINUTE=500
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=moneyvault
      - POSTGRES_USER=moneyvault
      - POSTGRES_PASSWORD=moneyvault
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyvault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data_dev:
  caddy_data_dev:
  caddy_config_dev:
