services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - BACKEND_URL=backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - DATABASE_URL=postgres://moneyvault:${DB_PASSWORD}@db:5432/moneyvault?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - MIGRATIONS_PATH=file://migrations
      - ENVIRONMENT=production
      - PORT=8080
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=moneyvault
      - POSTGRES_USER=moneyvault
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyvault"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  caddy_data:
  caddy_config:
